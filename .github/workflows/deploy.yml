name: CD Deployment (One-Command)

on:
  push:
    branches: [ main ] # Deploy to production on push to main

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
             cd /opt/openclaw/content-house
             git pull origin main
             
             # Create .env from secrets
             echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
             echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> .env
             echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
             echo "OPENCLAW_API_KEY=${{ secrets.OPENCLAW_API_KEY }}" >> .env
             echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> .env
             echo "KINGPREMIUM_LICENSE_PK=${{ secrets.LICENSE_PK }}" >> .env
             
             # Restart Stack
             docker compose pull
             docker compose up -d --build
             
             # Run Migrations
             docker compose exec -T app-api npx prisma migrate deploy
             
             # Cleanup
             docker system prune -f
